<div class="shell">
  <aside class="sidebar" [class.open]="menuAberto()">
    <div class="sidebar-header">
      <div class="brand">
        <span class="brand-name"><span>Cash</span><strong>Flow</strong></span>
      </div>
      <button class="close-btn" (click)="fecharMenu()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <nav class="nav">
      <a routerLink="/painel" routerLinkActive="active" class="nav-item" (click)="fecharMenu()">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span>Painel</span>
      </a>

      <a routerLink="/lancamentos" routerLinkActive="active" class="nav-item" (click)="fecharMenu()">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
          <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
        </svg>
        <span>Lançamentos</span>
      </a>

      <a routerLink="/metas" routerLinkActive="active" class="nav-item" (click)="fecharMenu()">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>
        </svg>
        <span>Metas</span>
      </a>

      <a routerLink="/simulador" routerLinkActive="active" class="nav-item" (click)="fecharMenu()">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>
        </svg>
        <span>Simulador</span>
      </a>

      @if (auth.isAdmin()) {
        <a routerLink="/admin" routerLinkActive="active" class="nav-item" (click)="fecharMenu()">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <span>Admin</span>
        </a>
      }
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">{{ (auth.nome() ?? 'U')[0].toUpperCase() }}</div>
        <div class="user-details">
          <span class="user-name">{{ auth.nome() }}</span>
          @if (auth.isAdmin()) {
            <span class="badge badge-warning">Admin</span>
          }
        </div>
      </div>
      <button class="logout-btn" (click)="logout()" title="Sair">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </aside>

  @if (menuAberto()) {
    <div class="overlay" (click)="fecharMenu()"></div>
  }

  <div class="main">
    <header class="topbar">
      <button class="menu-btn" (click)="toggleMenu()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="topbar-brand"><span>Cash</span><strong>Flow</strong></span>
    </header>
    <main class="content">
      <router-outlet />
    </main>
  </div>
</div>
