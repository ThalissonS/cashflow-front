<div class="form-card">
  <div class="form-card__header">
    <div class="form-card__icon form-card__icon--blue">↓</div>
    <div>
      <h3 class="form-card__title">Nova Despesa</h3>
      <p class="form-card__subtitle">Registre um gasto ou conta a pagar</p>
    </div>
  </div>

  <form [formGroup]="formDespesa" (ngSubmit)="enviarParaNuvem()" class="form-body">
    <div class="field-group">
      <label class="field-label">Descrição</label>
      <input type="text" formControlName="descricao" placeholder="Ex: Conta de Luz">
    </div>

    <div class="form-row">
      <div class="field-group">
        <label class="field-label">Valor (R$)</label>
        <input type="number" formControlName="valor" placeholder="0,00" step="0.01" min="0">
      </div>
      <div class="field-group">
        <label class="field-label">Vencimento</label>
        <input type="date" formControlName="dataVencimento">
      </div>
    </div>

    <div formGroupName="categoria" class="field-group">
      <label class="field-label">Categoria</label>
      <select formControlName="id">
        <option value="" disabled selected>Selecione uma categoria...</option>
        @for (cat of categorias; track cat.id) {
          <option [value]="cat.id">{{ cat.nome }}</option>
        }
      </select>
    </div>

    <button type="submit" [disabled]="formDespesa.invalid" class="btn btn--primary btn--full">
      Salvar Despesa
    </button>
  </form>

  @if (mensagem) {
    <div class="form-feedback"
      [class.form-feedback--success]="mensagem.startsWith('✅')"
      [class.form-feedback--error]="mensagem.startsWith('❌')">
      {{ mensagem }}
    </div>
  }
</div>
